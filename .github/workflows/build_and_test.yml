name: Build and test

on:
    push:
      branches: [ "master" ]
      tags: "v*.*.*"
    pull_request:
      branches: [ "master" ]
    workflow_dispatch:
      inputs:
        windows:
          description: 'build and test (Windows)'
          type: boolean
          default: true
        linux:
          description: 'build and test (Linux)'
          type: boolean
          default: true
        macos:
          description: 'build and test (macOS)'
          type: boolean
          default: true
        test_enabled:
          description: 'enable testing (disable to build only)'
          type: boolean
          default: true
        release:
          description: 'build release variant (all OS)'
          type: boolean
          default: true
        debug:
          description: 'build debug variant (all OS)'
          type: boolean
          default: true
        coverage:
          description: 'build coverage variant (all OS)'
          type: boolean
          default: true
        vcpkg_force_rebuild:
          description: 'Force vcpkg dependencies rebuild'
          type: boolean
          default: false
        checkpoints:
          description: 'Upterm checkpoints (manual debugging)'
          type: boolean
          default: false
        pi_checkpoints:
          description: 'Pi coding agent checkpoints (automatic debugging)'
          type: boolean
          default: false
        pi_model:
          description: 'Model for pi coding agent'
          type: string
          default: 'deepseek-v4-flash'
        pi_timeout:
          description: 'Timeout in seconds for pi coding agent'
          type: number
          default: 600
        create_draft_release:
          description: 'create draft release and upload build artifacts to it'
          type: boolean
          default: false
    schedule:
      - cron: "0 1 * * *" # every day at 1am

permissions:
  contents: write
  checks: write
  packages: write

# Default values for boolean inputs when NOT workflow_dispatch
# Used by the setup job to resolve inputs.
# Keep in sync with workflow_dispatch defaults above.
env:
  checkpoints_enabled: false
  # pi coding agent
  pi_checkpoint_enabled: false
  PI_MODEL: 'openrouter/openai/gpt-oss-20b:free'
  PI_TIMEOUT: 600
  OPENCODE_API_KEY: ''
  OPENROUTER_API_KEY: ''
  # Defaults for push / PR / schedule triggers
  WINDOWS_DEFAULT: 'true'
  LINUX_DEFAULT: 'true'
  MACOS_DEFAULT: 'true'
  TEST_ENABLED_DEFAULT: 'true'
  RELEASE_DEFAULT: 'true'
  DEBUG_DEFAULT: 'true'
  COVERAGE_DEFAULT: 'true'
  VCPKG_FORCE_REBUILD_DEFAULT: 'false'
  CHECKPOINTS_DEFAULT: 'false'
  PI_CHECKPOINTS_DEFAULT: 'false'
  CREATE_DRAFT_RELEASE_DEFAULT: 'false'
  CONVERT_PATH_FN: "echo"
  RUST_BACKTRACE: "1"
  QT_QPA_PLATFORM: "offscreen"
  NATIVE_SHELL_CMD: "bash -c"
  BASH_FLAGS: ""
  PIP_BREAK_SYSTEM_PACKAGES: 1

jobs:

  ##############################################################
  ## Setup job: resolve build settings from workflow inputs
  ##############################################################
  setup:
    runs-on: ubuntu-latest
    outputs:
      windows: ${{ steps.resolve.outputs.windows }}
      linux: ${{ steps.resolve.outputs.linux }}
      macos: ${{ steps.resolve.outputs.macos }}
      test_enabled: ${{ steps.resolve.outputs.test_enabled }}
      release: ${{ steps.resolve.outputs.release }}
      debug: ${{ steps.resolve.outputs.debug }}
      coverage: ${{ steps.resolve.outputs.coverage }}
      vcpkg_force_rebuild: ${{ steps.resolve.outputs.vcpkg_force_rebuild }}
      checkpoints: ${{ steps.resolve.outputs.checkpoints }}
      pi_checkpoints: ${{ steps.resolve.outputs.pi_checkpoints }}
      create_draft_release: ${{ steps.resolve.outputs.create_draft_release }}
    steps:
      - name: Resolve boolean inputs with fallback defaults
        id: resolve
        shell: bash
        run: |
          resolve() {
            local name="$1"
            local default="$2"
            local input_val="$3"
            if [ -n "$input_val" ]; then
              echo "$name=$input_val" >> "$GITHUB_OUTPUT"
            else
              echo "$name=$default" >> "$GITHUB_OUTPUT"
            fi
          }
          resolve windows "${{ env.WINDOWS_DEFAULT }}" "${{ github.event.inputs.windows }}"
          resolve linux "${{ env.LINUX_DEFAULT }}" "${{ github.event.inputs.linux }}"
          resolve macos "${{ env.MACOS_DEFAULT }}" "${{ github.event.inputs.macos }}"
          resolve test_enabled "${{ env.TEST_ENABLED_DEFAULT }}" "${{ github.event.inputs.test_enabled }}"
          resolve release "${{ env.RELEASE_DEFAULT }}" "${{ github.event.inputs.release }}"
          resolve debug "${{ env.DEBUG_DEFAULT }}" "${{ github.event.inputs.debug }}"
          resolve coverage "${{ env.COVERAGE_DEFAULT }}" "${{ github.event.inputs.coverage }}"
          resolve vcpkg_force_rebuild "${{ env.VCPKG_FORCE_REBUILD_DEFAULT }}" "${{ github.event.inputs.vcpkg_force_rebuild }}"
          resolve checkpoints "${{ env.CHECKPOINTS_DEFAULT }}" "${{ github.event.inputs.checkpoints }}"
          resolve pi_checkpoints "${{ env.PI_CHECKPOINTS_DEFAULT }}" "${{ github.event.inputs.pi_checkpoints }}"
          resolve create_draft_release "${{ env.CREATE_DRAFT_RELEASE_DEFAULT }}" "${{ github.event.inputs.create_draft_release }}"

  ##############################################################
  ## Release creation for tag pushes
  ##############################################################

  maybe_create_release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      if: startsWith(github.ref, 'refs/tags/')
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      id: create_release
      with:
        draft: true
        generate_release_notes: true
        append_body: true
        body: |
          This is a development release. Consider alpha / unstable until v1.0.0.

          ## Installation
          Choose between Python wheels, portable folder archives and packages/installers per platform.
          For details, refer to the [full installation instructions](https://github.com/SanderVocke/shoopdaloop/blob/master/INSTALL.md).
    - name: Store asset upload URL
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: echo "${{ steps.create_release.outputs.upload_url }}" > release_upload_assets_url.txt
    - name: Upload asset upload URL
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: release_upload_assets_url
        path: release_upload_assets_url.txt
    - uses: ./.github/actions/checkpoint
      if: startsWith(github.ref, 'refs/tags/')


  #############################################################
  ## Check format
  #############################################################

  check_format:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Check format
      uses: ./.github/actions/check_format



  ##############################################################
  ## Linux
  ##############################################################

  build_linux:
    strategy:
      fail-fast: false
      matrix:
        kind:
          - name: linux_release
            release_build: true
            package_kind: portable_folder
            second_package_kind: appimage
            third_package_kind: test_binaries
            upload_release_assets: true
            platform: linux-x64
          - name: linux_debug
            release_build: false
            package_kind: portable_folder
            second_package_kind: test_binaries
            upload_release_assets: true
            platform: linux-x64
          # - name: linux_asan
          #   # Note: ASAN build does not have a test because it is not trivial to deploy
          #   # an asan-built program on another system. The build is here to ensure the
          #   # build process still works. To use ASAN, compile like this natively.
          #   release_build: false
          #   package_kind: appimage
          #   cmake_opts: '"ENABLE_ASAN" = "On"'
          #   platform: linux-x64
          - name: linux_coverage
            release_build: false
            package_kind: portable_folder
            second_package_kind: test_binaries
            coverage: true
            platform: linux-x64
        container:
          - image: docker.io/sandervocke/shoopdaloop_build_base_debian_bookworm_x86_64:latest
            volumes:
              - /var/run/docker.sock:/var/run/docker.sock
              - /tmp/container:/tmp/host
            options: --privileged --pid=host --user root --workdir /
        arch: [ x86_64 ]
        manylinux_arch: [ x86_64 ]
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.container.image }}
      options: ${{ matrix.container.options }}
      volumes: ${{ matrix.container.volumes }}
    env:
      PATH_SEPARATOR: ":"
      COMPRESS_FOLDER_FN: bash -c "OUT=\$(pwd)/\$(basename \$1.tar.gz); PARENT=\$1/..; FOLDER=\$(basename \$1); cd \$PARENT; tar -czf \$OUT \$FOLDER > /dev/null; echo \$OUT" _
      pi_checkpoint_enabled: ${{ needs.setup.outputs.pi_checkpoints }}
      PI_MODEL: ${{ github.event.inputs.pi_model || 'openrouter/openai/gpt-oss-20b:free' }}
      PI_TIMEOUT: ${{ github.event.inputs.pi_timeout || 600 }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      checkpoints_enabled: ${{ needs.setup.outputs.checkpoints }}
    needs: [maybe_create_release, setup]
    if: ${{ needs.setup.outputs.linux == 'true' && (needs.setup.outputs.release == 'true' || needs.setup.outputs.debug == 'true' || needs.setup.outputs.coverage == 'true') }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: ./.github/actions/print_build_settings
    - name: Free disk space on host
      shell: bash
      run: |
        apt install util-linux
        cp scripts/third_party/gha_ubuntu_free_disk_space.sh /tmp/host
        nsenter -t 1 -m -u -n -i bash /tmp/container/gha_ubuntu_free_disk_space.sh
    - uses: ./.github/actions/checkpoint_setup
      with:
        shell: "bash --noprofile --norc ${{ env.BASH_FLAGS }} -eo pipefail"
    - name: Build
      if: always()
      uses: ./.github/actions/build_toplevel
      with:
        name: ${{ matrix.kind.name }}
        platform: ${{ matrix.kind.platform }}
        release_build: ${{ matrix.kind.release_build }}
        prepare_kind: 'linux'
        python: python3.11
        package_kind: ${{ matrix.kind.package_kind }}
        second_package_kind: ${{ matrix.kind.second_package_kind }}
        third_package_kind: ${{ matrix.kind.third_package_kind }}
        coverage: ${{ matrix.kind.coverage }}
        upload_release_assets: ${{ (needs.setup.outputs.create_draft_release == 'true' && matrix.kind.upload_release_assets && startsWith(github.ref, 'refs/tags/')) && 'true' || 'false' }}
        vcpkg_rebuild: ${{ needs.setup.outputs.vcpkg_force_rebuild }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        sentry_auth_token: ${{ secrets.SENTRY_AUTH_TOKEN }}
    - uses: ./.github/actions/checkpoint
      if: always()
    - uses: ./.github/actions/upload_coding_agent_artifact
      if: always()

  test_linux:
    strategy:
      fail-fast: false
      matrix:
        kind:
          - name: release_debian_stable
            python: python3
            container: docker.io/sandervocke/shoopdaloop_run_base_debian_latest_x86_64:latest
            package: shoopdaloop.*.release-linux-x64.portable.tar.gz
            second_package: shoopdaloop.*.release-linux-x64.test_binaries.tar.gz
            sentry_build_type: release
          - name: debug_debian_stable
            python: python3
            container: docker.io/sandervocke/shoopdaloop_run_base_debian_latest_x86_64:latest
            package: shoopdaloop.*.debug-linux-x64.portable.tar.gz
            second_package: shoopdaloop.*.debug-linux-x64.test_binaries.tar.gz
            sentry_build_type: debug
          - name: release_debian_appimage
            python: python3
            container: docker.io/sandervocke/shoopdaloop_run_base_debian_latest_x86_64:latest
            package: shoopdaloop.*.release-linux-x64.AppImage
            sentry_build_type: release
          - name: coverage_debian_bookworm
            python: python3
            container: docker.io/sandervocke/shoopdaloop_build_base_debian_bookworm_x86_64:latest
            coverage: true
            package: shoopdaloop.*.coverage-linux-x64.portable.tar.gz
            second_package: shoopdaloop.*.coverage-linux-x64.test_binaries.tar.gz
            run_cmd_prefix: >-
              BASEDIR=$(pwd)
              REPORTDIR=coverage_reports
              BUILDDIR=$(pwd)
              ORI_BUILD_DIR=$(cat ori_build_dir.txt)
              DO_GENHTML=0
              SHOOP_LOG=QoverageCollectorFactory=debug
              QML_IMPORT_PATH=$(~/.local/bin/qoverage --importpath)
              scripts/run_and_generate_coverage.sh
    runs-on: ubuntu-latest
    needs: [build_linux, setup]
    if: ${{ needs.setup.outputs.test_enabled == 'true' && needs.setup.outputs.linux == 'true' && (needs.setup.outputs.release == 'true' || needs.setup.outputs.debug == 'true' || needs.setup.outputs.coverage == 'true') }}
    container:
      image: ${{ matrix.kind.container }}
      options: --user root --workdir / # Note: this gets disregarded if container is null
    env:
      checkpoints_enabled: ${{ needs.setup.outputs.checkpoints }}
      pi_checkpoint_enabled: ${{ needs.setup.outputs.pi_checkpoints }}
      PI_MODEL: ${{ github.event.inputs.pi_model || 'openrouter/openai/gpt-oss-20b:free' }}
      PI_TIMEOUT: ${{ github.event.inputs.pi_timeout || 600 }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - uses: ./.github/actions/print_build_settings
    - uses: ./.github/actions/checkpoint_setup
      with:
        shell: bash --noprofile --norc ${{ env.BASH_FLAGS }} -eo pipefail
    - uses: ./.github/actions/checkpoint
      if: always()
    - name: Test
      if: always()
      uses: ./.github/actions/test_toplevel
      with:
        name: ${{ matrix.kind.name }}
        package: ${{ matrix.kind.package }}
        second_package: ${{ matrix.kind.second_package }}
        asan: ${{ matrix.kind.asan }}
        coverage: ${{ matrix.kind.coverage }}
        python: ${{ matrix.kind.python }}
        run_cmd_prefix: ${{ matrix.kind.run_cmd_prefix }}
        codecov_token: ${{ secrets.CODECOV_TOKEN }}
        sentry_key: ${{ secrets.SENTRY_KEY }}
        sentry_build_type: ${{ matrix.kind.sentry_build_type }}
    - uses: ./.github/actions/checkpoint
      if: always()
    - uses: ./.github/actions/upload_coding_agent_artifact
      if: always()









  

  ##############################################################
  ## MacOS
  ##############################################################

  build_macos:
    strategy:
      fail-fast: false
      matrix:
        kind:
          - name: macos_release
            release_build: true
            package_kind: portable_folder
            second_package_kind: test_binaries
            # third_package_kind: dmg
            os: macos-15-intel
            upload_release_assets: true
            platform: macos-x64
          - name: macos_debug
            release_build: false
            package_kind: portable_folder
            second_package_kind: test_binaries
            # third_package_kind: dmg
            os: macos-15-intel
            upload_release_assets: true
            platform: macos-x64
          - name: macos_release_arm
            release_build: true
            package_kind: portable_folder
            # second_package_kind: dmg
            third_package_kind: test_binaries
            os: macos-15
            upload_release_assets: true
            platform: macos-arm
          - name: macos_debug_arm
            release_build: false
            package_kind: portable_folder
            second_package_kind: test_binaries
            os: macos-15
            upload_release_assets: true
            platform: macos-arm
    runs-on: ${{ matrix.kind.os }}
    needs: [maybe_create_release, setup]
    if: ${{ needs.setup.outputs.macos == 'true' && (needs.setup.outputs.release == 'true' || needs.setup.outputs.debug == 'true') }}
    env:
       PATH_SEPARATOR: ":"
       COMPRESS_FOLDER_FN: bash -c "OUT=\$(pwd)/\$(basename \$1.tar.gz); PARENT=\$1/..; FOLDER=\$(basename \$1); cd \$PARENT; tar -czf \$OUT \$FOLDER > /dev/null; echo \$OUT" _
       checkpoints_enabled: ${{ needs.setup.outputs.checkpoints }}
       pi_checkpoint_enabled: ${{ needs.setup.outputs.pi_checkpoints }}
       PI_MODEL: ${{ github.event.inputs.pi_model || 'openrouter/openai/gpt-oss-20b:free' }}
       PI_TIMEOUT: ${{ github.event.inputs.pi_timeout || 600 }}
       OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
       OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: ./.github/actions/print_build_settings
    - uses: ./.github/actions/checkpoint_setup
      with:
        shell: bash --noprofile --norc ${{ env.BASH_FLAGS }} -eo pipefail
    - name: Build
      uses: ./.github/actions/build_toplevel
      with:
        name: ${{ matrix.kind.name }}
        platform: ${{ matrix.kind.platform }}
        cmake_build_type: ${{ matrix.kind.build_type }}
        prepare_kind: 'macos'
        python: python3
        appbundle: ${{ matrix.kind.appbundle }}
        package_kind: ${{ matrix.kind.package_kind }}
        second_package_kind: ${{ matrix.kind.second_package_kind }}
        third_package_kind: ${{ matrix.kind.third_package_kind }}
        release_build: ${{ matrix.kind.release_build }}
        coverage: ${{ matrix.kind.coverage }}
        upload_release_assets: ${{ (needs.setup.outputs.create_draft_release == 'true' && matrix.kind.upload_release_assets && startsWith(github.ref, 'refs/tags/')) && 'true' || 'false' }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        macos_target_version: ${{ matrix.kind.macos_target_version }}
        vcpkg_rebuild: ${{ needs.setup.outputs.vcpkg_force_rebuild }}
        sentry_auth_token: ${{ secrets.SENTRY_AUTH_TOKEN }}
    - uses: ./.github/actions/checkpoint
      if: always()
    - uses: ./.github/actions/upload_coding_agent_artifact
      if: always()

  test_macos:
    strategy:
      fail-fast: false
      matrix:
        kind:
          - name: release_macos_arm
            python: python3
            container: null
            os: macos-15
            package: shoopdaloop.*.release-macos-arm.portable.tar.gz
            second_package: shoopdaloop.*.release-macos-arm.test_binaries.tar.gz
            sentry_build_type: release
          - name: debug_macos_arm
            python: python3
            container: null
            os: macos-15
            package: shoopdaloop.*.debug-macos-arm.portable.tar.gz
            second_package: shoopdaloop.*.debug-macos-arm.test_binaries.tar.gz
            sentry_build_type: debug
          - name: release_macos
            python: python3
            container: null
            os: macos-15-intel
            package: shoopdaloop.*.release-macos-x64.portable.tar.gz
            second_package: shoopdaloop.*.release-macos-x64.test_binaries.tar.gz
            sentry_build_type: release
          - name: debug_macos
            python: python3
            container: null
            os: macos-15-intel
            package: shoopdaloop.*.debug-macos-x64.portable.tar.gz
            second_package: shoopdaloop.*.debug-macos-x64.test_binaries.tar.gz
            sentry_build_type: debug
    runs-on: ${{ matrix.kind.os }}
    needs: [build_macos, setup]
    if: ${{ needs.setup.outputs.test_enabled == 'true' && needs.setup.outputs.macos == 'true' && (needs.setup.outputs.release == 'true' || needs.setup.outputs.debug == 'true') }}
    container:
      image: ${{ matrix.kind.container }}
      options: --user root --workdir / # Note: this gets disregarded if container is null
    env:
      PATH_SEPARATOR: ":"
      checkpoints_enabled: ${{ needs.setup.outputs.checkpoints }}
      pi_checkpoint_enabled: ${{ needs.setup.outputs.pi_checkpoints }}
      PI_MODEL: ${{ github.event.inputs.pi_model || 'openrouter/openai/gpt-oss-20b:free' }}
      PI_TIMEOUT: ${{ github.event.inputs.pi_timeout || 600 }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - uses: ./.github/actions/print_build_settings
    - uses: ./.github/actions/checkpoint_setup
      with:
        shell: bash --noprofile --norc ${{ env.BASH_FLAGS }} -eo pipefail
    - name: Test
      uses: ./.github/actions/test_toplevel
      with:
        name: ${{ matrix.kind.name }}
        package: ${{ matrix.kind.package }}
        second_package: ${{ matrix.kind.second_package }}
        asan: ${{ matrix.kind.asan }}
        coverage: ${{ matrix.kind.coverage }}
        python: ${{ matrix.kind.python }}
        codecov_token: ${{ secrets.CODECOV_TOKEN }}
        sentry_build_type: ${{ matrix.kind.sentry_build_type }}
    - uses: ./.github/actions/checkpoint


















  ##############################################################
  ## Windows
  ##############################################################

  build_windows:
    strategy:
      fail-fast: false
      matrix:
        kind:
          - name: windows_release
            os: windows-2022
            python: python.exe
            pip: python.exe -m pip
            container_image: null
            prepare: 'windows'
            release_build: true
            package_kind: portable_folder
            second_package_kind: innosetup
            third_package_kind: test_binaries
            upload_release_assets: true
            platform: windows-msvc-x64
          - name: windows_debug
            os: windows-2022
            python: python.exe
            pip: python.exe -m pip
            container_image: null
            prepare: 'windows'
            release_build: false
            package_kind: portable_folder
            second_package_kind: test_binaries
            platform: windows-msvc-x64
          # - name: windows_arm_debug
          #   os: windows-11-arm
          #   python: python.exe
          #   pip: python.exe -m pip
          #   container_image: null
          #   prepare: 'windows'
          #   release_build: false
          #   package_kind: portable_folder
          #   second_package_kind: test_binaries
          #   platform: windows-msvc-arm
    runs-on: ${{ matrix.kind.os}}
    needs: [maybe_create_release, setup]
    env:
      NATIVE_SHELL_CMD: "powershell -Command"
      PATH_SEPARATOR: ";"
      CONVERT_PATH_FN: bash -c "cygpath -w \$1 | sed 's/\\\\/\\\\\\\\/g'" _
      COMPRESS_FOLDER_FN: bash -c "OUT=\$(pwd)/\$(basename \$1.tar.gz); PARENT=\$1/..; FOLDER=\$(basename \$1); cd \$PARENT; tar -czf \$OUT \$FOLDER > /dev/null; echo \$OUT" _
      pi_checkpoint_enabled: ${{ needs.setup.outputs.pi_checkpoints }}
      PI_MODEL: ${{ github.event.inputs.pi_model || 'openrouter/openai/gpt-oss-20b:free' }}
      PI_TIMEOUT: ${{ github.event.inputs.pi_timeout || 600 }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      checkpoints_enabled: ${{ needs.setup.outputs.checkpoints }}
    if: ${{ needs.setup.outputs.windows == 'true' && (needs.setup.outputs.release == 'true' || needs.setup.outputs.debug == 'true') }}
    container:
      image: ${{ matrix.kind.container_image }}
      options: --user root --workdir /
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: ./.github/actions/print_build_settings
    - uses: ./.github/actions/checkpoint_setup
      with:
        shell: bash --noprofile --norc ${{ env.BASH_FLAGS }} -eo pipefail
    - name: Build
      uses: ./.github/actions/build_toplevel
      with:
        name: ${{ matrix.kind.name }}
        platform: ${{ matrix.kind.platform }}
        cmake_build_type: ${{ matrix.kind.build_type }}
        prepare_kind: ${{ matrix.kind.prepare }}
        python: ${{ matrix.kind.python }}
        package_kind: ${{ matrix.kind.package_kind }}
        second_package_kind: ${{ matrix.kind.second_package_kind }}
        third_package_kind: ${{ matrix.kind.third_package_kind }}
        coverage: ${{ matrix.kind.coverage }}
        release_build: ${{ matrix.kind.release_build }}
        upload_release_assets: ${{ (needs.setup.outputs.create_draft_release == 'true' && matrix.kind.upload_release_assets && startsWith(github.ref, 'refs/tags/')) && 'true' || 'false' }}
        vcpkg_rebuild: ${{ needs.setup.outputs.vcpkg_force_rebuild }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        sentry_auth_token: ${{ secrets.SENTRY_AUTH_TOKEN }}
    - uses: ./.github/actions/checkpoint
    - uses: ./.github/actions/upload_coding_agent_artifact
      if: always()

  test_windows:
    strategy:
      fail-fast: false
      matrix:
        kind:
          - name: release_windows
            python: python.exe
            container: null
            os: windows-2022
            package: shoopdaloop.*.release-windows-msvc-x64.portable.tar.gz
            second_package: shoopdaloop.*.release-windows-msvc-x64.test_binaries.tar.gz
            pathconvert: "| cygpath -u -f -"
            sentry_build_type: release
          - name: release_windows_innosetup
            python: python.exe
            container: null
            os: windows-2022
            package: ShoopDaLoop-Installer-*.exe
            pathconvert: "| cygpath -u -f -"
            sentry_build_type: release
          - name: debug_windows
            python: python.exe
            container: null
            os: windows-2022
            package: shoopdaloop.*.release-windows-msvc-x64.portable.tar.gz
            second_package: shoopdaloop.*.release-windows-msvc-x64.test_binaries.tar.gz
            pathconvert: "| cygpath -u -f -"
            sentry_build_type: debug
    runs-on: ${{ matrix.kind.os }}
    needs: [build_windows, setup]
    env:
      pi_checkpoint_enabled: ${{ needs.setup.outputs.pi_checkpoints }}
      PI_MODEL: ${{ github.event.inputs.pi_model || 'openrouter/openai/gpt-oss-20b:free' }}
      PI_TIMEOUT: ${{ github.event.inputs.pi_timeout || 600 }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      checkpoints_enabled: ${{ needs.setup.outputs.checkpoints }}
    if: ${{ needs.setup.outputs.test_enabled == 'true' && needs.setup.outputs.windows == 'true' && (needs.setup.outputs.release == 'true' || needs.setup.outputs.debug == 'true') }}
    container:
      image: ${{ matrix.kind.container }}
      options: --user root --workdir / # Note: this gets disregarded if container is null
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - uses: ./.github/actions/print_build_settings
    - uses: ./.github/actions/checkpoint_setup
      with:
        shell: bash --noprofile --norc ${{ env.BASH_FLAGS }} -eo pipefail
    - name: Test
      uses: ./.github/actions/test_toplevel
      with:
        name: ${{ matrix.kind.name }}
        package: ${{ matrix.kind.package }}
        second_package: ${{ matrix.kind.second_package }}
        asan: ${{ matrix.kind.asan }}
        coverage: ${{ matrix.kind.coverage }}
        python: ${{ matrix.kind.python }}
        codecov_token: ${{ secrets.CODECOV_TOKEN }}
        sentry_build_type: ${{ matrix.kind.sentry_build_type }}
    - uses: ./.github/actions/checkpoint

















