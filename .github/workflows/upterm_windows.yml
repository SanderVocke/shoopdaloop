name: Windows Upterm test session

on: workflow_dispatch

permissions:
  contents: read
  checks: write

jobs:
  tmate:
    runs-on: windows-2022
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Setup upterm session
      uses: owenthereal/action-upterm@v1
      with:
        limit-access-to-actor: true
  