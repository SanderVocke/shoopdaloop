name: Ubuntu Upterm test session

on: workflow_dispatch

permissions:
  contents: read
  checks: write

jobs:
  upterm:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Setup upterm session
      uses: owenthereal/action-upterm@v1
      with:
        limit-access-to-actor: true