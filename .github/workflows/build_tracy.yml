name: Build Tracy

on:
  workflow_dispatch:
    inputs:
      tracy_version:
        description: 'Tracy git tag or branch (e.g. v0.13.1)'
        required: true
        default: 'v0.13.1'
        type: string

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-22.04
            artifact: tracy-linux-x64.tar.gz
          - name: macos
            os: macos-15-intel
            artifact: tracy-macos-x64.tar.gz
          - name: windows
            os: windows-2022
            artifact: tracy-windows-msvc-x64.zip

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libcapstone-dev \
          libcurl4-openssl-dev \
          libdbus-1-dev \
          libfreetype-dev \
          libglfw3-dev \
          liblz4-dev \
          libtbb-dev \
          libxcb-keysyms1-dev \
          libxcb-shm0-dev \
          libxkbcommon-x11-dev \
          ninja-build \
          qt6-base-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install \
          capstone \
          curl \
          freetype \
          glfw \
          lz4 \
          ninja \
          qt@6 \
          tbb

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install -y ninja

    - name: Setup Qt (Linux)
      if: runner.os == 'Linux'
      run: |
        echo "Qt6_DIR=/usr/lib/x86_64-linux-gnu/cmake/Qt6" >> $GITHUB_ENV

    - name: Setup Qt (macOS)
      if: runner.os == 'macOS'
      run: |
        echo "/opt/homebrew/opt/qt@6/bin" >> $GITHUB_PATH
        echo "CMAKE_PREFIX_PATH=/opt/homebrew/opt/qt@6" >> $GITHUB_ENV

    - name: Setup Qt (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        curl -L "https://download.qt.io/official_releases/qt/6.8/6.8.1/qt-unified-windows-x64-online.exe" -o qt-installer.exe
        .\qt-installer.exe --verbose --root C:\Qt --al --accept-licenses --default-answer default --confirm-command install qt.base.qt6
        echo "C:\Qt\6.8.1\msvc2022_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8
        echo "CMAKE_PREFIX_PATH=C:\Qt\6.8.1\msvc2022_64" | Out-File -FilePath $env:GITHUB_ENV

    - name: Clone Tracy
      shell: bash
      run: |
        git clone --depth 1 --branch ${{ inputs.tracy_version }} https://github.com/wolfpld/tracy.git

    # Build each Tracy component separately (matching AUR PKGBUILD layout)
    - name: Build all Tracy components (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        for component in capture csvexport import profiler update; do
          CMAKE_ARGS=(-G Ninja -DCMAKE_BUILD_TYPE=Release)
          if [ -n "${Qt6_DIR}" ]; then
            CMAKE_ARGS+=(-DQt6_DIR="${Qt6_DIR}")
          fi
          if [ -n "${CMAKE_PREFIX_PATH}" ]; then
            CMAKE_ARGS+=(-DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}")
          fi
          cmake -S tracy/${component} -B tracy/${component}/build "${CMAKE_ARGS[@]}"
          cmake --build tracy/${component}/build --config Release --parallel
        done

    - name: Build all Tracy components (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $components = @("capture", "csvexport", "import", "profiler", "update")
        foreach ($component in $components) {
          $cmakeArgs = @("-G", "Ninja", "-DCMAKE_BUILD_TYPE=Release")
          if ($env:CMAKE_PREFIX_PATH) { $cmakeArgs += "-DCMAKE_PREFIX_PATH=$env:CMAKE_PREFIX_PATH" }
          cmake -S tracy/$component -B tracy/$component/build @cmakeArgs
          cmake --build tracy/$component/build --config Release --parallel
        }

    - name: Collect and compress (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        mkdir -p dist
        cp tracy/profiler/build/tracy-profiler  dist/
        cp tracy/capture/build/tracy-capture    dist/
        cp tracy/csvexport/build/tracy-csvexport dist/
        cp tracy/import/build/tracy-import-chrome dist/
        cp tracy/import/build/tracy-import-fuchsia dist/
        cp tracy/update/build/tracy-update      dist/
        for bin in dist/tracy-*; do strip "$bin"; done
        tar -czf ${{ matrix.artifact }} -C dist .

    - name: Collect and compress (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        mkdir -p dist
        cp tracy/profiler/build/tracy-profiler  dist/
        cp tracy/capture/build/tracy-capture    dist/
        cp tracy/csvexport/build/tracy-csvexport dist/
        cp tracy/import/build/tracy-import-chrome dist/
        cp tracy/import/build/tracy-import-fuchsia dist/
        cp tracy/update/build/tracy-update      dist/
        tar -czf ${{ matrix.artifact }} -C dist .

    - name: Collect and compress (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        mkdir -Force dist | Out-Null
        Copy-Item tracy/profiler/build/Release/tracy-profiler.exe dist/
        Copy-Item tracy/capture/build/Release/tracy-capture.exe dist/ -ErrorAction SilentlyContinue
        Copy-Item tracy/csvexport/build/Release/tracy-csvexport.exe dist/ -ErrorAction SilentlyContinue
        Copy-Item tracy/import/build/Release/tracy-import-chrome.exe dist/ -ErrorAction SilentlyContinue
        Copy-Item tracy/import/build/Release/tracy-import-fuchsia.exe dist/ -ErrorAction SilentlyContinue
        Copy-Item tracy/update/build/Release/tracy-update.exe dist/ -ErrorAction SilentlyContinue
        # Also try non-Release paths for any that didn't exist
        Copy-Item tracy/profiler/build/tracy-profiler.exe dist/ -ErrorAction SilentlyContinue
        Compress-Archive -Path dist/* -DestinationPath ${{ matrix.artifact }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}
        retention-days: 30
