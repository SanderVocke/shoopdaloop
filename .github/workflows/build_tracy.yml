name: Build Tracy

on:
  workflow_dispatch:
    inputs:
      tracy_version:
        description: 'Tracy git tag or branch (e.g. v0.13.1)'
        required: true
        default: 'v0.13.1'
        type: string

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-22.04
            artifact: tracy-linux-x64.tar.gz
            qt_pkg: qt6-base-dev
          - name: macos
            os: macos-15-intel
            artifact: tracy-macos-x64.tar.gz
            qt_pkg: qt@6
          - name: windows
            os: windows-2022
            artifact: tracy-windows-msvc-x64.zip
            qt_pkg: ''

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libcapstone-dev \
          libcurl4-openssl-dev \
          libfreetype-dev \
          libglfw3-dev \
          liblz4-dev \
          libtbb-dev \
          libxcb-keysyms1-dev \
          libxcb-shm0-dev \
          libxkbcommon-x11-dev \
          ninja-build \
          qt6-base-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install \
          capstone \
          curl \
          freetype \
          glfw \
          lz4 \
          ninja \
          qt@6 \
          tbb

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install -y ninja

    - name: Setup Qt (macOS)
      if: runner.os == 'macOS'
      run: |
        echo "/opt/homebrew/opt/qt@6/bin" >> $GITHUB_PATH
        echo "CMAKE_PREFIX_PATH=/opt/homebrew/opt/qt@6" >> $GITHUB_ENV

    - name: Setup Qt (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        # Use Qt installer for Windows
        curl -L "https://download.qt.io/official_releases/qt/6.8/6.8.1/qt-unified-windows-x64-online.exe" -o qt-installer.exe
        .\qt-installer.exe --verbose --root C:\Qt --al --accept-licenses --default-answer default --confirm-command install qt.base.qt6
        echo "C:\Qt\6.8.1\msvc2022_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8
        echo "CMAKE_PREFIX_PATH=C:\Qt\6.8.1\msvc2022_64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8

    - name: Clone Tracy
      shell: bash
      run: |
        git clone --depth 1 --branch ${{ inputs.tracy_version }} https://github.com/wolfpld/tracy.git
        cd tracy
        echo "Built version: $(git describe --tags 2>/dev/null || git rev-parse HEAD)"

    - name: Configure and build (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        cd tracy
        mkdir -p build
        cmake -S . -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="${{ env.CMAKE_PREFIX_PATH }}" \
          -DTRACY_ONLY=ON
        cmake --build build --config Release --parallel

    - name: Configure and build (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        cd tracy
        mkdir -Force build | Out-Null
        cmake -S . -B build `
          -G "Ninja" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="${{ env.CMAKE_PREFIX_PATH }}" `
          -DTRACY_ONLY=ON
        cmake --build build --config Release --parallel

    - name: Collect and compress (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        mkdir -p dist
        cp tracy/build/tracy dist/
        strip dist/tracy
        tar -czf ${{ matrix.artifact }} -C dist tracy

    - name: Collect and compress (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        mkdir -p dist
        cp tracy/build/tracy dist/
        tar -czf ${{ matrix.artifact }} -C dist tracy

    - name: Collect and compress (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        mkdir -Force dist | Out-Null
        Copy-Item tracy/build/Release/tracy.exe dist/
        Copy-Item tracy/build/tracy.exe dist/ -ErrorAction SilentlyContinue
        Compress-Archive -Path dist/* -DestinationPath ${{ matrix.artifact }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}
        retention-days: 30
