name: QML Tests
description: Integration tests at the QML level

inputs:
  tee_all_output_to:
    type: string
    default: /dev/null
  macos_rpath_patch:
    type: boolean
    required: false
    default: false

runs:
  using: "composite"
  steps:
  - name: prepare
    if: always()
    shell: wrap-shell {0}
    run: |
      mkdir -p reports
      echo "RESULTS_XML=reports/qml_test_results.xml" | tee -a $GITHUB_ENV

  - name: QML test
    if: always()
    shell: wrap-shell {0}
    run: >
      QT_ASSUME_STDERR_HAS_CONSOLE=1
      ${{ env.RUN_CMD_PREFIX }} timeout -s 9 15m ${{ env.COMMAND_SHOOPDALOOP }} --self-test --junit-xml ${{ env.RESULTS_XML }}
      2>&1 | tee ${{ inputs.tee_all_output_to }}

  - name: Find LLVM coverage artifacts (profraw, gcno, gcda, etc.)
    if: always()
    shell: wrap-shell {0}
    run: |
      echo "=========================================="
      echo "Searching for LLVM coverage artifacts..."
      echo "=========================================="
      echo "--- .profraw files ---"
      find . -name '*.profraw' -type f 2>/dev/null || echo "(none found)"
      echo "--- .gcno files ---"
      find . -name '*.gcno' -type f 2>/dev/null || echo "(none found)"
      echo "--- .gcda files ---"
      find . -name '*.gcda' -type f 2>/dev/null || echo "(none found)"
      echo "--- All coverage-related files (profraw, profdata, gcno, gcda, lcov, cov) ---"
      find . \( -name '*.profraw' -o -name '*.profdata' -o -name '*.gcno' -o -name '*.gcda' -o -name '*.lcov' -o -name '*.cov' \) -type f 2>/dev/null || echo "(none found)"
      echo "--- Also checking current working dir ---"
      pwd
      echo "--- Contents of target/debug (if exists) ---"
      ls -laR target/debug/*.profraw 2>/dev/null || echo "(no .profraw in target/debug)"
      echo "--- Contents of portable folder (if exists) ---"
      ls -laR ${PORTABLE_FOLDER_INSTALL:-./portable} 2>/dev/null | head -100 || echo "(portable folder not found)"
      echo "=========================================="
      echo "FAILING INTENTIONALLY FOR DEBUGGING"
      echo "=========================================="
      exit 1

  - name: Report results filename
    shell: wrap-shell {0}
    if: always()
    run: |
      echo "QML test results file: $(ls -la ${{ env.RESULTS_XML }})"

  - name: Publish QML Test Report
    if: always()
    uses: mikepenz/action-junit-report@v3
    with:
      report_paths: ${{ env.RESULTS_XML }}
      include_passed: false
      check_name: 'QML test'
      annotate_only: true

