name: prepare_build_linux
description: Prepare Linux for building Shoopdaloop wheels

runs:
  using: "composite"
  steps:
  - name: Prepare Rust
    uses: actions-rust-lang/setup-rust-toolchain@v1
  - name: Install Nextest
    shell: wrap-shell {0}
    run: cargo install cargo-nextest
  - name: Install packages, set Qt CMake prefix
    shell: wrap-shell {0}
    run: |
      python3 -m pip install --upgrade pip build auditwheel patchelf
      echo "CMAKE_PREFIX_PATH=/usr/lib/x86_64-linux-gnu/cmake/Qt6" > prepend_build_cmd.txt