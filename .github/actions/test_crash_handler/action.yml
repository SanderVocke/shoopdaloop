name: Crash handler test
description: Test that the crash handler successfully captures a minidump and QML stack trace

inputs:
  variant_name:
    required: true
    type: string
  root_path:
    type: string
    required: true

runs:
  using: "composite"
  steps:
  - name: Setup crash dumps directory
    if: always()
    shell: wrap-shell {0}
    run: |
      mkdir -p crashdumps
      echo "SHOOP_CRASHDUMP_DIR=$(pwd)/crashdumps" | tee -a $GITHUB_ENV
      echo "SHOOP_CRASH_METADATA_BASE_JSON={\"environment\": \"ci\", \"tags\": {\"ci_build_type\": \"${{ inputs.variant_name }}\", \"ci_run\": \"${{ github.run_id }}\"}}" | tee -a $GITHUB_ENV

  - name: Run app with intentional panic
    if: always()
    shell: wrap-shell {0}
    run: >
        ${{ env.RUN_CMD_PREFIX }} ./scripts/run_with_timeout.sh 30 ${{ env.COMMAND_SHOOPDALOOP }}
        --backend=dummy
        --developer
        --panic-after=5
        2>&1 | tee crash_handler_test_output.log || true

  - name: Check for minidump
    if: always()
    shell: wrap-shell {0}
    run: |
      echo "=== Checking for minidump ==="
      find crashdumps -name "*.dmp" -type f
      if [ $(find crashdumps -name "*.dmp" -type f | wc -l) -gt 0 ]; then
        echo "MINIDUMP_FOUND=true" | tee -a $GITHUB_OUTPUT
        echo "SUCCESS: Minidump file was created"
      else
        echo "MINIDUMP_FOUND=false" | tee -a $GITHUB_OUTPUT
        echo "FAILURE: No minidump file found in crashdumps/"
        exit 1
      fi

  - name: Check for QML stack trace
    if: always()
    shell: wrap-shell {0}
    run: |
      echo "=== Checking for QML stack trace ==="
      if [ -f "crash_handler_test_output.log" ]; then
        # The QML stack trace should appear in the log output
        if grep -q "qml_stack\|ShoopApplicationWindow\|QML\|Timer\|panic_after" crash_handler_test_output.log 2>/dev/null; then
          echo "QML_STACK_FOUND=true" | tee -a $GITHUB_OUTPUT
          echo "SUCCESS: QML-related output found in log"
        else
          echo "QML_STACK_FOUND=false" | tee -a $GITHUB_OUTPUT
          echo "WARNING: QML stack trace not clearly identifiable in log (may still exist in minidump)"
        fi
      else
        echo "QML_STACK_FOUND=false" | tee -a $GITHUB_OUTPUT
        echo "WARNING: No log file found"
      fi

  - name: Verify app crashed as expected
    if: always()
    shell: wrap-shell {0}
    run: |
      echo "=== Verifying crash behavior ==="
      if [ -f "crash_handler_test_output.log" ]; then
        # We expect the app to have crashed
        if grep -qi "panic\|abort\|segfault\|crash" crash_handler_test_output.log 2>/dev/null; then
          echo "CRASH_AS_EXPECTED=true" | tee -a $GITHUB_OUTPUT
          echo "SUCCESS: App crashed as expected"
        else
          echo "CRASH_AS_EXPECTED=false" | tee -a $GITHUB_OUTPUT
          echo "FAILURE: App did not appear to crash"
          exit 1
        fi
      else
        echo "CRASH_AS_EXPECTED=false" | tee -a $GITHUB_OUTPUT
        echo "FAILURE: No log file found"
        exit 1
      fi

  - name: Upload crash dump artifacts
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: crash_dumps_${{ inputs.variant_name }}
      path: |
        crashdumps/
        crash_handler_test_output.log
      retention-days: 7
