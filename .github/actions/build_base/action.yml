name: Build Base
description: Do a build in the checked out repository

inputs:
  release_build:
    description: "if true, does a release build. Otherwise, a debug build."
    default: 'false'
  coverage:
    description: "if true, do a coverage build"
    default: 'false'

runs:
  using: "composite"
  steps:

  - name: Rust cache
    uses: Swatinem/rust-cache@v2
    if: runner.os != 'Windows'
    with:
        prefix-key: v4
        env-vars: "CARGO CC CFLAGS CXX CMAKE RUST PYO3"

  - name: Set release flags
    if: always() && inputs.release_build == 'true'
    shell: wrap-shell {0}
    run: |
        echo "CARGO_PROFILE=release-with-debug" | tee -a $GITHUB_ENV
        echo "CARGO_BUILD_FLAGS=--profile release-with-debug" | tee -a $GITHUB_ENV
        echo "BUILD_ENV_FILE=./build/build-env-release.sh" | tee -a $GITHUB_ENV

  - name: Set debug flags
    if: always() && inputs.release_build != 'true'
    shell: wrap-shell {0}
    run: |
        echo "CARGO_PROFILE=dev" | tee -a $GITHUB_ENV
        echo "CARGO_BUILD_FLAGS=--profile dev" | tee -a $GITHUB_ENV
        echo "BUILD_ENV_FILE=./build/build-env-debug.sh" | tee -a $GITHUB_ENV

  - name: Set coverage flags
    if: always() && inputs.coverage == 'true'
    shell: wrap-shell {0}
    run: |
        echo "CARGO_BUILD_FLAGS=${{ env.CARGO_BUILD_FLAGS }} --features coverage" | tee -a $GITHUB_ENV 
        echo "RUSTFLAGS=$RUSTFLAGS -C instrument-coverage" | tee -a $GITHUB_ENV

  - name: Setup build env and build vcpkg packages
    if: always()
    shell: wrap-shell {0}
    run: |
      set -x
      ${PYTHON} scripts/vcpkg_prebuild.py --vcpkg-args=--clean-after-build 2>&1 | tee vcpkg_build_output.txt
      echo ""
      echo "Build env file ${BUILD_ENV_FILE}" contents:
      cat ${BUILD_ENV_FILE}
      rm -rf ${VCPKG_ROOT}/buildtrees

  - name: Check rustfmt
    if: always() && inputs.check_format == 'true'
    shell: wrap-shell {0}
    run: |
      cargo fmt --all --check

  - name: Extra flags for main build
    if: always()
    shell: wrap-shell {0}
    run: |
      echo "RUSTFLAGS=$RUSTFLAGS -Dwarnings" | tee -a $GITHUB_ENV

  - name: Debug C++ compiler info before build
    if: always()
    shell: wrap-shell {0}
    run: |
      echo "==== Pre-build compiler debug ===="
      which c++ && c++ --version || true
      which clang++ && clang++ --version || true
      env | grep -E '^(RUST|CARGO|CC|CXX|CFLAGS|CXXFLAGS)' | sort
      echo "==== End pre-build compiler debug ===="

  - name: Build main packages
    if: always()
    shell: wrap-shell {0}
    run: |
      set -x
      . ${BUILD_ENV_FILE}
      cargo build -vv ${CARGO_BUILD_FLAGS}

  - name: Debug generated CXX files on failure
    if: failure()
    shell: wrap-shell {0}
    run: |
      echo "==== Build failed - dumping generated CXX bridge files ===="
      find target -path '*/cxxbridge/sources/*' -name '*.rs.cc' | head -20 | while read f; do
        echo "--- $f ---"
        head -200 "$f"
      done
      echo "==== Dumping full failing source if known ===="
      find target -name 'midi_state_diff_tracker_cxx.rs.cc' -o -name 'midi_state_tracker_cxx.rs.cc' | while read f; do
        echo "--- FULL $f ---"
        cat "$f"
      done
      echo "==== End debug dump ===="

  - name: Build test code
    if: always()
    shell: wrap-shell {0}
    run: |
      set -x
      . ${BUILD_ENV_FILE}
      cargo test --no-run ${CARGO_BUILD_FLAGS}
