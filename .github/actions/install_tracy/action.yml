name: Install Tracy
description: Download and install tracy-capture from a GitHub release

runs:
  using: "composite"
  steps:
  - name: Download and install Tracy (Linux x64)
    if: runner.os == 'Linux'
    shell: wrap-shell {0}
    run: |
      mkdir -p tracy_bin
      curl -L "https://github.com/SanderVocke/shoopdaloop/releases/download/build-assets-2/tracy-linux-x64.tar.gz.zip" \
        -o tracy_bin/tracy.zip
      unzip -o tracy_bin/tracy.zip -d tracy_bin
      tar -xzf tracy_bin/tracy-linux-x64.tar.gz -C tracy_bin
      # Find the binary regardless of subdirectory structure
      TRACY_BIN=$(find tracy_bin -name tracy-capture -type f | head -1)
      if [ -z "$TRACY_BIN" ]; then
        echo "ERROR: tracy-capture not found in archive"
        exit 1
      fi
      if [ "$TRACY_BIN" != "tracy_bin/tracy-capture" ]; then
        cp "$TRACY_BIN" tracy_bin/tracy-capture
      fi
      chmod +x tracy_bin/tracy-capture
      echo "TRACY_CAPTURE_TOOL=$(pwd)/tracy_bin/tracy-capture" | tee -a $GITHUB_ENV

  - name: Download and install Tracy (macOS x64)
    if: runner.os == 'macOS' && runner.arch == 'X64'
    shell: wrap-shell {0}
    run: |
      mkdir -p tracy_bin
      curl -L "https://github.com/SanderVocke/shoopdaloop/releases/download/build-assets-2/tracy-macos-x64.tar.gz.zip" \
        -o tracy_bin/tracy.zip
      unzip -o tracy_bin/tracy.zip -d tracy_bin
      tar -xzf tracy_bin/tracy-macos-x64.tar.gz -C tracy_bin
      # Find the binary regardless of subdirectory structure
      TRACY_BIN=$(find tracy_bin -name tracy-capture -type f | head -1)
      if [ -z "$TRACY_BIN" ]; then
        echo "ERROR: tracy-capture not found in archive"
        exit 1
      fi
      if [ "$TRACY_BIN" != "tracy_bin/tracy-capture" ]; then
        cp "$TRACY_BIN" tracy_bin/tracy-capture
      fi
      chmod +x tracy_bin/tracy-capture
      echo "TRACY_CAPTURE_TOOL=$(pwd)/tracy_bin/tracy-capture" | tee -a $GITHUB_ENV

  - name: Download and install Tracy (macOS arm64)
    if: runner.os == 'macOS' && runner.arch == 'ARM64'
    shell: wrap-shell {0}
    run: |
      mkdir -p tracy_bin
      curl -L "https://github.com/SanderVocke/shoopdaloop/releases/download/build-assets-2/tracy-macos-arm64.tar.gz.zip" \
        -o tracy_bin/tracy.zip
      unzip -o tracy_bin/tracy.zip -d tracy_bin
      tar -xzf tracy_bin/tracy-macos-arm64.tar.gz -C tracy_bin
      # Find the binary regardless of subdirectory structure
      TRACY_BIN=$(find tracy_bin -name tracy-capture -type f | head -1)
      if [ -z "$TRACY_BIN" ]; then
        echo "ERROR: tracy-capture not found in archive"
        exit 1
      fi
      if [ "$TRACY_BIN" != "tracy_bin/tracy-capture" ]; then
        cp "$TRACY_BIN" tracy_bin/tracy-capture
      fi
      chmod +x tracy_bin/tracy-capture
      echo "TRACY_CAPTURE_TOOL=$(pwd)/tracy_bin/tracy-capture" | tee -a $GITHUB_ENV

  - name: Download and install Tracy (Windows)
    if: runner.os == 'Windows'
    shell: powershell -Command {0}
    run: |
      New-Item -ItemType Directory -Force -Path tracy_bin
      Invoke-WebRequest -Uri "https://github.com/SanderVocke/shoopdaloop/releases/download/build-assets-2/tracy-windows-msvc-x64.zip" -OutFile "tracy_bin\tracy.zip"
      Expand-Archive -Path "tracy_bin\tracy.zip" -DestinationPath "tracy_bin" -Force
      # Find the binary regardless of subdirectory structure
      $tool = Get-ChildItem -Path "tracy_bin" -Filter "tracy-capture.exe" -Recurse -File | Select-Object -First 1
      if (-not $tool) {
        Write-Error "tracy-capture.exe not found in archive"
        exit 1
      }
      if ($tool.FullName -ne (Join-Path (Get-Location) "tracy_bin\tracy-capture.exe")) {
        Copy-Item $tool.FullName "tracy_bin\tracy-capture.exe" -Force
      }
      $toolPath = Join-Path (Get-Location) "tracy_bin\tracy-capture.exe"
      echo "TRACY_CAPTURE_TOOL=$toolPath" >> $env:GITHUB_ENV
