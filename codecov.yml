ignore:
  - ".github"
  - "docs"
  - "dist"
  - "distribution"
  - "scripts"
  - "src/backend/third_party"
  - "build"
  - "src/qml/third_party"
  - "portable"

fixes:
  - "/__w/shoopdaloop/shoopdaloop/::"

comment:
  layout: "header, diff, flags, components"

component_management:
  individual_components:
    - component_id: cpp
      name: C(++)
      paths:
        - "**/*.cpp"
        - "**/*.h"
        - "**/*.hpp"
        - "**/*.c"
    - component_id: rust
      name: Rust
      paths:
        - "src/rust/**"

coverage:
  status:
    project:
      default:
        branches:
          - master
        informational: true
    patch:
      default:
        branches:
          - master
        informational: true
